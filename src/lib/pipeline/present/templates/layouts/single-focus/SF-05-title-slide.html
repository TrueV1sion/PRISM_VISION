<!-- template: SF-05-title-slide -->
<!-- data_shapes: none -->
<!-- density: sparse (0 points) -->

<section class="slide title-slide {{slot:slide_class}}">
  <div class="slide-inner" style="text-align: center;">
    <div class="hero-badge anim">{{slot:badge}}</div>
    <h1 class="hero-title anim d1">{{slot:headline}}</h1>
    <p class="hero-sub anim d2">{{slot:subhead}}</p>
    <p class="hero-date anim d3">{{slot:date}}</p>
  </div>
</section>
