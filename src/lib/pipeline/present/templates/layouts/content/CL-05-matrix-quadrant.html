<!-- template: CL-05-matrix-quadrant -->
<!-- data_shapes: comparison -->
<!-- density: sparse (4 points) -->

<section class="slide {{slot:slide_class}}">
  <div class="slide-inner">
    <h2 class="slide-title anim">{{slot:headline}}</h2>
    <p class="slide-subtitle anim d1">{{slot:subhead}}</p>

    <div class="grid-2 anim d2" style="gap: 12px;">
      <div class="stat-card card-cyan">
        <div class="stat-label">{{slot:q1_label}}</div>
        <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 8px;">{{slot:q1_content}}</p>
      </div>
      <div class="stat-card card-green">
        <div class="stat-label">{{slot:q2_label}}</div>
        <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 8px;">{{slot:q2_content}}</p>
      </div>
      <div class="stat-card card-orange">
        <div class="stat-label">{{slot:q3_label}}</div>
        <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 8px;">{{slot:q3_content}}</p>
      </div>
      <div class="stat-card card-purple">
        <div class="stat-label">{{slot:q4_label}}</div>
        <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 8px;">{{slot:q4_content}}</p>
      </div>
    </div>
  </div>
</section>
