<!-- component: icon-marker -->
<div style="display: flex; align-items: flex-start; gap: 12px; margin: 8px 0;">
  <span class="dot {{slot:color_class}}" style="width: 10px; height: 10px; margin-top: 6px; flex-shrink: 0;"></span>
  <div>
    <div class="highlight">{{slot:title}}</div>
    <div style="color: var(--text-secondary); font-size: var(--text-sm);">{{slot:description}}</div>
  </div>
</div>
